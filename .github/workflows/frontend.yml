# Repository root: Practice/
# Frontend app: AI-Projects/pk-foodfactory

name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - master
      - release
    paths:
      - 'AI-Projects/pk-foodfactory/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: AI-Projects/pk-foodfactory/package-lock.json

      - name: Install dependencies
        working-directory: AI-Projects/pk-foodfactory
        run: npm ci

      - name: Build frontend
        working-directory: AI-Projects/pk-foodfactory
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          set -e
          if [ -z "${VITE_API_URL:-}" ]; then
            echo "::error::Set repository secret VITE_API_URL to your deployed backend API base URL, e.g. http://foodfactory-eb-backend-env.eba-xxxx.ap-south-1.elasticbeanstalk.com/api (must match http/https and include /api)."
            exit 1
          fi
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync built site to S3
        run: |
          aws s3 sync AI-Projects/pk-foodfactory/dist "s3://${{ secrets.AWS_S3_BUCKET_FRONTEND }}" --delete
