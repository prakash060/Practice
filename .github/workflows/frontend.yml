# Repository root: Practice/
# Frontend app: AI-Projects/pk-foodfactory

name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - master
      - release
    paths:
      - 'AI-Projects/pk-foodfactory/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: AI-Projects/pk-foodfactory/package-lock.json

      - name: Install dependencies
        working-directory: AI-Projects/pk-foodfactory
        run: npm ci

      - name: Build frontend
        working-directory: AI-Projects/pk-foodfactory
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          set -e
          if [ -z "${VITE_API_URL:-}" ]; then
            echo "::error::Set repository secret VITE_API_URL to your HTTPS API CloudFront base URL, e.g. https://d3cvs28uau3ofy.cloudfront.net/api (must include /api, no trailing slash)."
            exit 1
          fi
          case "${VITE_API_URL}" in
            http://*)
              echo "::error::VITE_API_URL must use https:// when the frontend is on HTTPS CloudFront. Use your API CloudFront URL (not the raw Elastic Beanstalk http:// URL) to avoid mixed-content blocks."
              exit 1
              ;;
          esac
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync built site to S3
        run: |
          aws s3 sync AI-Projects/pk-foodfactory/dist "s3://${{ secrets.AWS_S3_BUCKET_FRONTEND }}" --delete

      # S3 website ErrorDocument only applies to the s3-website endpoint, NOT CloudFront REST origin.
      # Reload on /login needs CloudFront custom error responses (see configure_cloudfront_spa.py).
      - name: Configure S3 static website (optional; not used by CloudFront origin)
        run: |
          aws s3api put-bucket-website \
            --bucket "${{ secrets.AWS_S3_BUCKET_FRONTEND }}" \
            --website-configuration '{
              "IndexDocument": {"Suffix": "index.html"},
              "ErrorDocument": {"Key": "index.html"}
            }'

      - name: Configure CloudFront SPA error pages
        env:
          CF_DIST_ID: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -e
          if [ -z "${CF_DIST_ID:-}" ]; then
            echo "::warning::AWS_CLOUDFRONT_DISTRIBUTION_ID is not set — skipping SPA error page configuration."
            echo "Without this, reloading https://your-cf-domain/login returns S3 AccessDenied XML."
            echo "Set the secret (Distribution ID starting with E) or configure error pages manually in AWS Console."
            exit 0
          fi
          python3 AI-Projects/pk-foodfactory/scripts/configure_cloudfront_spa.py --distribution-id "$CF_DIST_ID"

      - name: Configure API CloudFront CORS (edge headers + cache)
        env:
          API_CF_DIST_ID: ${{ secrets.AWS_API_CLOUDFRONT_DISTRIBUTION_ID }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        run: |
          set -e
          if [ -z "${API_CF_DIST_ID:-}" ]; then
            echo "::warning::AWS_API_CLOUDFRONT_DISTRIBUTION_ID is not set — skipping API CloudFront CORS setup."
            exit 0
          fi
          python3 AI-Projects/pk-foodfactory/scripts/configure_cloudfront_api_cors.py --distribution-id "$API_CF_DIST_ID"

      - name: Invalidate frontend CloudFront cache
        env:
          CF_DIST_ID: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -e
          if [ -z "${CF_DIST_ID:-}" ]; then
            echo "::warning::AWS_CLOUDFRONT_DISTRIBUTION_ID is not set — skipping CloudFront invalidation."
            echo "Add the secret in GitHub (Settings → Secrets → Actions). Use the Distribution ID from AWS:"
            echo "  CloudFront → Distributions → select frontend distro → General → Distribution ID (starts with E, e.g. E2XXXXXXXXXXXX)."
            echo "Do not use the *.cloudfront.net URL prefix (e.g. d1a7288bn24qfa)."
            exit 0
          fi
          case "${CF_DIST_ID}" in
            E*|e*) ;;
            *)
              echo "::error::AWS_CLOUDFRONT_DISTRIBUTION_ID must be the CloudFront Distribution ID (starts with E), not the domain prefix. Found: ${CF_DIST_ID}"
              exit 1
              ;;
          esac
          aws cloudfront create-invalidation \
            --distribution-id "$CF_DIST_ID" \
            --paths "/*"
