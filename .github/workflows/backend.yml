# Repository root: Practice/
# Backend app: AI-Projects/pk-foodfactory-backend

name: Backend CI/CD

on:
  push:
    branches:
      - main
      - master
      - release
    paths:
      - 'AI-Projects/pk-foodfactory-backend/**'
      - 'AI-Projects/pk-foodfactory/scripts/configure_cloudfront_api_cors.py'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Build and deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: AI-Projects/pk-foodfactory-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: AI-Projects/pk-foodfactory-backend
        run: npm ci

      - name: Prepare deployment package
        working-directory: AI-Projects/pk-foodfactory-backend
        run: |
          zip -r "${{ github.workspace }}/backend-deploy.zip" . \
            -x "node_modules/*" ".git/*" "**/.github/*" ".env" "**/.env"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload deployment package to S3
        run: |
          VERSION_LABEL=gh-${{ github.run_number }}-${{ github.sha }}
          aws s3 cp "${{ github.workspace }}/backend-deploy.zip" "s3://${{ secrets.AWS_S3_BUCKET_BACKEND }}/${VERSION_LABEL}.zip"

      - name: Create Elastic Beanstalk application version
        run: |
          VERSION_LABEL=gh-${{ github.run_number }}-${{ github.sha }}
          aws elasticbeanstalk create-application-version \
            --application-name ${{ secrets.AWS_EB_APPLICATION_NAME }} \
            --version-label "$VERSION_LABEL" \
            --source-bundle S3Bucket=${{ secrets.AWS_S3_BUCKET_BACKEND }},S3Key="${VERSION_LABEL}.zip"
      # Set these repository/environment secrets to match pk-foodfactory-backend/.env (no .env in the zip).
      - name: Update Elastic Beanstalk environment
        env:
          EB_ENV_NAME: ${{ secrets.AWS_EB_ENVIRONMENT_NAME }}
          PORT: ${{ secrets.PORT }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        run: |
          set -e
          if [ -z "${MONGODB_URI:-}" ]; then
            echo "::warning::GitHub secret MONGODB_URI is empty — the workflow will not set it on Elastic Beanstalk. Add the secret (same value as local .env) or set MONGODB_URI / DATABASE_URL in the EB console."
          fi
          VERSION_LABEL=gh-${{ github.run_number }}-${{ github.sha }}
          INPUT=$(jq -n \
            --arg EnvironmentName "$EB_ENV_NAME" \
            --arg VersionLabel "$VERSION_LABEL" \
            --arg PORT "$PORT" \
            --arg MONGODB_URI "$MONGODB_URI" \
            --arg RAZORPAY_KEY_ID "$RAZORPAY_KEY_ID" \
            --arg RAZORPAY_KEY_SECRET "$RAZORPAY_KEY_SECRET" \
            --arg RAZORPAY_WEBHOOK_SECRET "$RAZORPAY_WEBHOOK_SECRET" \
            --arg JWT_SECRET "$JWT_SECRET" \
            --arg ADMIN_EMAIL "$ADMIN_EMAIL" \
            --arg CORS_ORIGINS "$CORS_ORIGINS" \
            --arg EMAIL_USER "$EMAIL_USER" \
            --arg EMAIL_PASS "$EMAIL_PASS" \
            '{
              EnvironmentName: $EnvironmentName,
              VersionLabel: $VersionLabel,
              OptionSettings: (
                [
                  {Namespace: "aws:elasticbeanstalk:application:environment", OptionName: "NODE_ENV", Value: "production"},
                  {Namespace: "aws:elasticbeanstalk:application:environment", OptionName: "PORT", Value: $PORT},
                  {Namespace: "aws:elasticbeanstalk:application:environment", OptionName: "MONGODB_URI", Value: $MONGODB_URI},
                  {Namespace: "aws:elasticbeanstalk:application:environment", OptionName: "RAZORPAY_KEY_ID", Value: $RAZORPAY_KEY_ID},
                  {Namespace: "aws:elasticbeanstalk:application:environment", OptionName: "RAZORPAY_KEY_SECRET", Value: $RAZORPAY_KEY_SECRET},
                  {Namespace: "aws:elasticbeanstalk:application:environment", OptionName: "RAZORPAY_WEBHOOK_SECRET", Value: $RAZORPAY_WEBHOOK_SECRET},
                  {Namespace: "aws:elasticbeanstalk:application:environment", OptionName: "JWT_SECRET", Value: $JWT_SECRET},
                  {Namespace: "aws:elasticbeanstalk:application:environment", OptionName: "ADMIN_EMAIL", Value: $ADMIN_EMAIL},
                  {Namespace: "aws:elasticbeanstalk:application:environment", OptionName: "CORS_ORIGINS", Value: $CORS_ORIGINS},
                  {Namespace: "aws:elasticbeanstalk:application:environment", OptionName: "EMAIL_USER", Value: $EMAIL_USER},
                  {Namespace: "aws:elasticbeanstalk:application:environment", OptionName: "EMAIL_PASS", Value: $EMAIL_PASS}
                ]
                | map(select(.Value != ""))
              )
            }')
          aws elasticbeanstalk update-environment --cli-input-json "$INPUT"

      - name: Configure API CloudFront for origin CORS (Free plan)
        env:
          API_CF_DIST_ID: ${{ secrets.AWS_API_CLOUDFRONT_DISTRIBUTION_ID }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        run: |
          set -e
          if [ -z "${API_CF_DIST_ID:-}" ]; then
            echo "::warning::AWS_API_CLOUDFRONT_DISTRIBUTION_ID is not set — skipping API CloudFront CORS setup."
            echo "Without this, browsers may see CORS errors when CloudFront caches API responses without forwarding Origin to Elastic Beanstalk."
            echo "Set the secret to your API distribution ID (CloudFront console → API distro → General, starts with E)."
            exit 0
          fi
          python3 AI-Projects/pk-foodfactory/scripts/configure_cloudfront_api_cors.py --distribution-id "$API_CF_DIST_ID"
